# config-version: 1.6.1
# - 升级到 LATEST 版本时，请务必阅读文档中的 CHANGELOG 了解重大更新内容！
#
# 重要提示：本插件完全禁用了原版钓鱼机制（除非明确启用），请勿在钓鱼方面使用其他插件以免冲突！

# ======================================================================
# 插件基础设置
# ======================================================================

# bStats 数据统计
bstats:
  # 是否启用 bStats 数据收集
  enabled: true
# 语言配置
language:
  # 当前使用的语言（zh_cn=中文简体，en_us=英语）
  current: "zh_cn"
# 时区配置（用于定时比赛等功能）
timezone:
  # 时区 ID（如 Asia/Shanghai、America/New_York、UTC），留空则使用服务器系统时区
  value: "Asia/Shanghai"
# 更新检查
update-check:
  # 是否自动检查插件更新
  enabled: true
# 调试模式
debug:
  # 是否开启调试模式（开启后会在控制台和游戏中显示详细的调试信息）
  enabled: false
# 视觉效果
visual-effects:
  # 是否启用粒子特效等视觉效果
  enabled: true
  # 鱼上钩动画效果配置
  fish-animation:
    # 是否启用鱼动画
    enabled: true
    # 最大动画持续刻数
    max-ticks: 40
    # 鱼跳出水面峰值高度
    peak-height: 2.5
    # 鱼移动最大速度
    max-speed: 0.5
    # 上升力度系数
    upward-force-factor: 0.25
    # 到达峰值的进度比例
    peak-progress: 0.25
    # 最低 Y 偏移
    min-y-offset: 0.8
    # 鱼跳向玩家配置
    jump-to-head:
      # 基础持续时间（刻）
      base-duration: 20
      # 距离倍率
      distance-multiplier: 5.0
      # 最大持续时间（刻）
      max-duration: 60
      # 初始跳跃高度
      initial-jump-height: 2.0
      # 抛物线曲线高度
      curve-height: 3.0
      # 缓动系数
      easing-factor: 2.0

# ======================================================================
# 世界与模式配置
# ======================================================================

# 世界白名单
world-whitelist:
  # 是否启用世界白名单（true=仅在白名单中的世界启用，false=在所有世界启用）
  enabled: true
  # 白名单中的世界列表
  worlds:
    - "spawn"
    - "world"
    - "world_nether"
    - "world_the_end"
# 钓鱼模式切换
mode-switch:
  # 是否允许玩家使用指令切换插件钓鱼/原版钓鱼模式
  allow-command-switch: true
  # 原版钓鱼模式设置
  vanilla-mode:
    # 在原版钓鱼模式下是否给自定义鱼类（true=使用插件鱼类，false=使用原版鱼类）
    give-custom-fish: true

# ======================================================================
# 核心钓鱼设置
# ======================================================================

fishing-settings:
  # 蓄力与抛竿
  # 最大蓄力时间（毫秒）
  max-charge-time: 3000
  # 抛竿冷却时间（毫秒）
  cast-cooldown: 5000
  # 咬钩设置
  # 基础咬钩概率（0.0-1.0）
  base-bite-chance: 0.2
  # 最大咬钩概率（0.0-1.0）
  max-bite-chance: 1.0
  # 咬钩检查最小延迟（毫秒）
  bite-check-delay-min: 5000
  # 咬钩检查最大延迟（毫秒）
  bite-check-delay-max: 15000
  # 咬钩提示超时时间（秒）
  bite-hint-timeout: 2
  # 鱼逃跑机制，影响两处逻辑：
  # 1. 鱼钩飞行超过吃钩超时(tick)后是否强制跑鱼
  # 2. 咬钩时是否按概率判定（false=必定咬钩，true=按bite-chance概率）
  # true=启用逃跑机制，false=禁用（必定上钩）
  escape: false
  # 初始进度百分比（0-100）
  initial-progress: 10
  # 进度条配置
  progress-bar:
    # 绿色区域增加速度（值越大，按住空格时绿色区域上升越快）
    increase-speed: 0.015
    # 绿色区域减少速度（值越大，松开空格时绿色区域下降越快）
    decrease-speed: 0.01
    # 稀有度影响配置
    rarity-impact:
      # 是否启用稀有度对进度条的影响
      enabled: true
      # 每个稀有度等级的减速值（稀有度越高，绿色区域增加越慢）
      slowdown-per-rarity-level: 0.15
      # 最小增加速度比例（无论稀有度多高，增加速度不会低于此比例）
      min-increase-speed-ratio: 0.45
  # 稀有度系统配置（权重值越大，该稀有度的鱼出现概率越高）
  rarity:
    common:
      # 稀有度显示名称（支持颜色代码 &）
      display-name: "&a普通"
      # 稀有度权重
      weight: 50
      # 价值倍率（影响鱼的售价）
      value-multiplier: 1.0
      # AuraSkills 经验倍率（如果安装了 AuraSkills 插件）
      aura-skills-xp-multiplier: 1.0
    uncommon:
      display-name: "&e优秀"
      weight: 25
      value-multiplier: 1.2
      aura-skills-xp-multiplier: 1.2
    rare:
      display-name: "&9稀有"
      weight: 15
      value-multiplier: 1.5
      aura-skills-xp-multiplier: 1.5
    epic:
      display-name: "&5史诗"
      weight: 8
      value-multiplier: 2.0
      aura-skills-xp-multiplier: 3.0
    legendary:
      display-name: "&6传说"
      weight: 2
      value-multiplier: 3.0
      aura-skills-xp-multiplier: 5.0
  # 原版经验
  # 是否启用原版钓鱼经验
  enable-vanilla-exp: true
  # 原版钓鱼经验倍率
  vanilla-exp-multiplier: 1.0
  # 是否完全禁用原版钓鱼
  disable-vanilla-fishing: false
  # 鱼竿耐久度
  durability:
    # 单次钓鱼最大耐久度损失
    max-single-loss: 5
    # 单次钓鱼基础耐久度损失
    base-loss: 1

# ======================================================================
# 鱼获广播配置
# ======================================================================

# 钓鱼广播
broadcast:
  # 是否启用鱼获广播
  enabled: true
  # 广播范围（global=全服，world=当前世界，none=仅自己）
  range: "global"

# ======================================================================
# 特殊钓鱼配置（岩浆/虚空）
# ======================================================================

# 岩浆钓鱼
lava-fishing:
  # 是否启用岩浆钓鱼
  enabled: true
  # 触发模式（AUTO=自动，PERMISSION=需要权限，EQUIPMENT=需要装备效果，BOTH=权限或装备均可）
  trigger-mode: AUTO
  # 咬钩检查延迟（毫秒）
  bite-time-min: 100
  bite-time-max: 400
  # 咬钩概率倍率
  bite-chance-multiplier: 0.8
  # 迷你游戏配置
  minigame:
    # 难度倍率
    difficulty-multiplier: 1.2
  # 视觉与音效配置
  effects:
    # 环境粒子效果
    ambient-particle: FLAME
    ambient-particle-count: 2
    # 咬钩粒子效果
    bite-particle: FLAME
    bite-particle-count: 20
    # 咬钩音效
    bite-sound: ENTITY_GENERIC_EXTINGUISH_FIRE
    bite-sound-volume: 0.25
    bite-sound-pitch: 1.0

# 虚空钓鱼
void-fishing:
  # 是否启用虚空钓鱼
  enabled: true
  # 触发模式
  trigger-mode: AUTO
  # 末地虚空检测配置
  end-detection:
    # 是否在末地启用虚空检测
    enabled: true
    # 倒计时刻数（20刻=1秒）
    countdown-ticks: 2
    # 是否需要鱼钩位置低于玩家
    require-below-player: true
  # 咬钩配置
  bite-time-min: 120
  bite-time-max: 500
  bite-chance-multiplier: 0.7
  # 迷你游戏配置
  minigame:
    difficulty-multiplier: 1.5
  # 视觉与音效配置
  effects:
    ambient-particle: END_ROD
    ambient-particle-count: 1
    bite-particle: END_ROD
    bite-particle-count: 20
    bite-sound: ITEM_TRIDENT_THUNDER
    bite-sound-volume: 0.25
    bite-sound-pitch: 1.0

# ======================================================================
# 进度条样式配置
# ======================================================================

styles:
  default:
    progress-char: "&9="
    progress-bar-empty-char: "&7-"
    green-bar-char: "&a|"
    green-bar-edge-char: "&2|"
    background-char: "&7|"
    fish-indicator-char: "&9|||"
  lava:
    progress-char: "&6="
    progress-bar-empty-char: "&8-"
    green-bar-char: "&c|"
    green-bar-edge-char: "&4|"
    background-char: "&8|"
    fish-indicator-char: "&e|||"
  void:
    progress-char: "&5═"
    progress-bar-empty-char: "&8─"
    green-bar-char: "&d|"
    green-bar-edge-char: "&5|"
    background-char: "&8|"
    fish-indicator-char: "&b|||"

# ======================================================================
# 经济系统配置
# ======================================================================

economy:
  # 经济系统主开关（控制出售、商店、鱼钩等所有经济相关功能）
  enabled: true
  # Vault 经济集成开关
  economy: true
  # PlayerPoints 经济集成开关
  playerpoints: true
  # 旧版 fish.yml 的 value 使用哪个经济系统: vault / playerpoints
  primary: vault
  # primary 不可用时，是否自动尝试另一个可用经济系统
  fallback: true
  # 出售功能开关
  sell: true
  # 出售 GUI 功能开关
  sellgui: true

# ======================================================================
# 季节性配置
# ======================================================================

seasonal:
  # 是否启用季节性功能
  enabled: true
  # 鱼价波动配置
  price-fluctuation:
    # 是否启用鱼价波动
    enabled: true
    # 四季价格倍率（相对基准）
    spring: 0.1
    summer: 0.2
    autumn: -0.1
    winter: -0.2
    # 基准价格波动
    base: 0.05

# ======================================================================
# 数据库配置
# ======================================================================

database:
  # 数据库类型（sqlite 或 mysql）
  type: "sqlite"
  # SQLite 配置
  sqlite:
    # 数据库文件名
    file: "data.db"
  # MySQL 配置（仅在 type=mysql 时生效）
  mysql:
    # MySQL 服务器地址
    host: "localhost"
    # MySQL 端口
    port: 3306
    # 数据库名称
    database: "kkfish"
    # 用户名
    username: "root"
    # 密码
    password: "password"
    # 表前缀
    table-prefix: "kkfish_"
    # 是否使用 SSL
    use-ssl: false
    # 连接超时（毫秒）
    timeout: 30000

# ======================================================================
# 物品模板配置
# ======================================================================

item-templates:
  # 鱼类物品模板
  fish-templates:
    default:
      content: |-
        &6┏━━━━━━━ 🐟 FISH DETAILS 🐟 ━━━━━━━┓
        &b┃ Name: &f%name%
        &a┃ Size: &f%size%&a cm
        &c┃ Value: &f%value%&c coins
        &d┃ Rarity: &f%rarity%
        &6┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
        &d✨ Special Effects:
        &7➤ %effects%
        &7
    simple:
      content: |-
        &b🐠 Name: %name%
        &a📏 Size: %size% cm
        &c💰 Value: %value% coins
        &d💎 Rarity: %rarity%
        &d✨ Special Effects:
        &7➤ %effects%
  # 鱼竿物品模板
  rod-templates:
    default:
      content: |-
        &6┏━━━━━━━ 🎣 ROD PROPERTIES 🎣 ━━━━━━━┓
        &b┃ Difficulty: &f%difficulty%
        &a┃ Float Area: &f%float_area%
        &c┃ Durability: &f%durability%
        &d┃ Charge Speed: &f%charge_speed%
        &5┃ Bite Rate Bonus: &f%bite_rate_bonus%
        &6┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
        &e✨ Special Effects:
        &7➤ %effects%
        &7🎣 Happy Fishing!
    compact:
      content: |-
        &b🎣 Core Rod Properties:
        &b├─ Difficulty: %difficulty% | Float Range: %float_area%
        &c├─ Durability: %durability%
        &d└─ Charge Speed: %charge_speed% | Bite Bonus: %bite_rate_bonus%
        &e✨ Special Effects: %effects%
  # 鱼钩物品模板
  hook-templates:
    default:
      content: |-
        &6┏━━━━━━━ 🪝 HOOK INFO 🪝 ━━━━━━━┓
        &7┃ Level: &f%level%
        %rarity_color%┃ Rarity: &f%rarity_name%
        &7┃ Description: &f%description%
        &6┠━━━━━━━ 📊 PERFORMANCE 📊 ━━━━━━━┨
        &7┃ %performance_metrics%
        &6┠━━━━━━━ 📋 STATUS 📋 ━━━━━━━┨
        &7┃ %status_info%
        &6┠━━━━━━━ ⚙️ EQUIPMENT ⚙️ ━━━━━━━┨
        &7┃ %equipment_info%
        &6┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
    simple:
      content: |-
        &7🪝 %rarity_color%%rarity_name%&7 | Level: %level%
        &7📝 %description%
        &7📊 Performance: %performance_metrics%
        &7📋 Status: %status_info%
        &7⚙️ Equipment: %equipment_info%
  # 鱼饵物品模板
  bait-templates:
    default:
      content: |-
        &6┏━━━━━━━ 🦐 BAIT DETAILS 🦐 ━━━━━━━┓
        &b┃ Name: &f%name%
        &7┃ Description: &f%description%
        &6┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
        &d✨ Bait Effects:
        &7➤ %effects%
        &7
    compact:
      content: |-
        &b🦐 Name: %name%
        &7📝 Description: %description%
        &d✨ Effects:
        &7➤ %effects%
